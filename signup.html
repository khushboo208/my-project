<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | AI Wardrobe</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v='20260330b') }}" data-ajax-style>
    <script src="{{ url_for('static', filename='js/app_nav.js') }}" defer></script>
</head>
<body class="auth-body">

<div class="auth-bg-glow"></div>
<div class="tokyo-lines"></div>
<div class="tokyo-sigil tokyo-sigil-left">TOKYO</div>
<div class="tokyo-sigil tokyo-sigil-right">SETSUZOKU</div>

<div class="auth-container">
    <p class="section-kicker">Create Account</p>
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-copy">Start your wardrobe system, teach it your pieces, and turn your closet into a clean styling archive.</p>

    <form method="POST" class="auth-form">
        <div class="input-group">
            <input type="text" name="name" required>
            <label>Name</label>
        </div>

        <div class="input-group">
            <input type="password" name="password" required>
            <label>Password</label>
        </div>

        <button type="submit" class="auth-btn">Register</button>
    </form>

    <div class="auth-divider"><span>OR</span></div>

    <a href="{{ url_for('google.login') }}" class="google-btn">Sign up with Google</a>

    <p class="auth-switch">
        <a href="{{ url_for('auth.login') }}">Already have an account? Login</a>
    </p>

    <div class="auth-footnote">Upload. Classify. Generate. Repeat until the closet behaves like an actual styling machine.</div>
</div>

</body>
</html>
